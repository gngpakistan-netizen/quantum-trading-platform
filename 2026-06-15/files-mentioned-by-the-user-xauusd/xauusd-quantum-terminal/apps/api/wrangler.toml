name = "xauusd-quantum-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Database
[[d1_databases]]
binding = "DB"
database_name = "xauusd-quantum-db"
database_id = ""

# Object Storage
[[r2_buckets]]
binding = "MARKET_DATA"
bucket_name = "xauusd-market-data"

# KV for caching / real-time state
[[kv_namespaces]]
binding = "REALTIME_STATE"
id = ""

# Environment variables
[vars]
ENVIRONMENT = "production"
SYMBOLS = "XAUUSD,DXY,US10Y,XAGUSD,EURUSD,GBPUSD,USDJPY,SPX500,NASDAQ,USOIL,COPPER,VIX"
TIMEFRAMES = "1m,5m,15m,30m,1h,4h,1d"
HISTORICAL_YEARS = "10"
MAX_CANDLES_RESPONSE = "5000"
AUDIT_ENABLED = "true"

# Analytics
[analytics_engine]
binding = "ANALYTICS"
dataset = "quantum_analytics"

# Cron triggers for scheduled tasks
[[triggers]]
crons = ["*/5 * * * *", "0 */6 * * *"]
