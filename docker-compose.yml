# XAUUSD Quantum Platform — Docker Compose
# Runs: API Gateway + Python engines
# Deployment-agnostic: works in Codespaces, VPS, or cloud container service

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
